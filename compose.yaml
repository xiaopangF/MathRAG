name: mathrag

x-backend-environment: &backend-environment
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
  MATHRAG_EMBEDDING_MODEL: ${MATHRAG_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
  MATHRAG_RERANKER_MODEL: ${MATHRAG_RERANKER_MODEL:-BAAI/bge-reranker-base}
  MATHRAG_MIN_RERANK_SCORE: ${MATHRAG_MIN_RERANK_SCORE:-0.2}
  MATHRAG_ENVIRONMENT: ${MATHRAG_ENVIRONMENT:-production}
  MATHRAG_ALLOW_RUNTIME_API_KEY: ${MATHRAG_ALLOW_RUNTIME_API_KEY:-false}
  MATHRAG_LOG_LEVEL: ${MATHRAG_LOG_LEVEL:-INFO}
  MATHRAG_LOG_JSON: ${MATHRAG_LOG_JSON:-true}
  MATHRAG_CORS_ORIGINS: ${MATHRAG_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
  MATHRAG_MAX_UPLOAD_MB: ${MATHRAG_MAX_UPLOAD_MB:-50}
  MATHRAG_MAX_JSON_BODY_MB: ${MATHRAG_MAX_JSON_BODY_MB:-1}
  MATHRAG_PDF_OCR_ENABLED: ${MATHRAG_PDF_OCR_ENABLED:-true}
  MATHRAG_PDF_OCR_LANGUAGES: ${MATHRAG_PDF_OCR_LANGUAGES:-chi_sim+eng}
  MATHRAG_PDF_OCR_DPI: ${MATHRAG_PDF_OCR_DPI:-200}
  MATHRAG_PDF_OCR_MAX_PAGES: ${MATHRAG_PDF_OCR_MAX_PAGES:-100}
  MATHRAG_SQLITE_TIMEOUT_SECONDS: ${MATHRAG_SQLITE_TIMEOUT_SECONDS:-10}
  MATHRAG_JOB_MAX_ATTEMPTS: ${MATHRAG_JOB_MAX_ATTEMPTS:-3}
  MATHRAG_RAG_MAX_CONCURRENCY: ${MATHRAG_RAG_MAX_CONCURRENCY:-2}
  MATHRAG_RAG_ACQUIRE_TIMEOUT_SECONDS: ${MATHRAG_RAG_ACQUIRE_TIMEOUT_SECONDS:-2}
  MATHRAG_LLM_TIMEOUT_SECONDS: ${MATHRAG_LLM_TIMEOUT_SECONDS:-30}
  MATHRAG_LLM_MAX_RETRIES: ${MATHRAG_LLM_MAX_RETRIES:-2}

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment: *backend-environment
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./reports:/app/reports
      - huggingface-cache:/root/.cache/huggingface
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  model-cache:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    environment: *backend-environment
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    command: ["python", "scripts/prewarm_models.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "same-origin"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  huggingface-cache:
